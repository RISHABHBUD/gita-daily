name: Post Daily Shloka Image

# Triggered by cron-job.org via repository_dispatch
# cron-job.org job: POST https://api.github.com/repos/YOUR_USER/YOUR_REPO/actions/workflows/post_image.yml/dispatches
# Body: {"ref":"main"}
# Schedule: 6:00 AM IST = 00:30 UTC
on:
  workflow_dispatch:   # manual trigger (for testing)
  repository_dispatch:
    types: [post_image]

jobs:
  post-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system dependencies (fonts + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto fonts-noto-cjk ffmpeg libharfbuzz-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate and post image
        env:
          CLOUDINARY_CLOUD_NAME:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:     ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:  ${{ secrets.CLOUDINARY_API_SECRET }}
          INSTAGRAM_USER_ID:      ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FACEBOOK_PAGE_TOKEN:    ${{ secrets.FACEBOOK_PAGE_TOKEN }}
        run: python run_daily.py --image-only

      - name: Commit posted.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add posted.json || true
          git diff --staged --quiet || git commit -m "chore: advance posted.json to day $(date +%j) [skip ci]"
          git push
